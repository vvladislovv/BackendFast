version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: backend_user
      POSTGRES_PASSWORD: backend_password
      POSTGRES_DB: backend_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - backend-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backend_user -d backend_db"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://backend_user:backend_password@db:5432/backend_db
      SECRET_KEY: fSyRcOQ2dhOUJcg-yxBRfmV6S876Y0WJ3c_CsdT-ARk
      TELEGRAM_BOT_TOKEN: 8318949552:AAETIEgzpnJJa4-lqkGA3CKWvPveGbuk5VY
      TELEGRAM_ADMIN_IDS: 7718206984
      DEBUG: "False"
      HOST: 0.0.0.0
      PORT: 8000
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    networks:
      - backend-network
    restart: unless-stopped
    command: >
      sh -c "sleep 5 && python scripts/init_migrations.py && python main.py"

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - db
      - api
    environment:
      DATABASE_URL: postgresql+asyncpg://backend_user:backend_password@db:5432/backend_db
      SECRET_KEY: fSyRcOQ2dhOUJcg-yxBRfmV6S876Y0WJ3c_CsdT-ARk
      TELEGRAM_BOT_TOKEN: 8318949552:AAETIEgzpnJJa4-lqkGA3CKWvPveGbuk5VY
      TELEGRAM_ADMIN_IDS: 7718206984
      LOG_LEVEL: INFO
      API_URL: http://api:8000
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    networks:
      - backend-network
    restart: unless-stopped
    command: sh -c "sleep 15 && python integrations/telegram/bot.py"

networks:
  backend-network:
    driver: bridge

volumes:
  postgres_data:
