version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: backend_user
      POSTGRES_PASSWORD: backend_password
      POSTGRES_DB: backend_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - backend-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backend_user -d backend_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://backend_user:backend_password@db:5432/backend_db
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-your-token}
      TELEGRAM_ADMIN_IDS: ${TELEGRAM_ADMIN_IDS:-123456789}
      DEBUG: "False"
      HOST: 0.0.0.0
      PORT: 8000
      LOG_LEVEL: INFO
      PYTHONPATH: /app
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
    networks:
      - backend-network
    restart: unless-stopped
    command: >
      sh -c "alembic upgrade head && python main.py"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - db
      - api
    environment:
      DATABASE_URL: postgresql+asyncpg://backend_user:backend_password@db:5432/backend_db
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-your-token}
      TELEGRAM_ADMIN_IDS: ${TELEGRAM_ADMIN_IDS:-123456789}
      LOG_LEVEL: INFO
      PYTHONPATH: /app
    volumes:
      - ./logs:/app/logs
    networks:
      - backend-network
    restart: unless-stopped
    command: python integrations/telegram/bot.py

networks:
  backend-network:
    driver: bridge

volumes:
  postgres_data:
